<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suneldah</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06080f;
      --text: #eceef5;
      --muted: #555c72;
      --accent: #c8ff57;
      --border: #13182a;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 0;
      overflow-x: hidden;
    }

    /* Grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 72px 72px;
      pointer-events: none;
      z-index: 0;
    }

    /* Accent blob */
    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -100px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, #c8ff5710 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.2rem 3.5rem;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .wordmark span {
      color: var(--accent);
    }

    .header-tag {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 3.5rem;
      max-width: 900px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    .eyebrow-text {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 8vw, 6.5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 2.5rem;
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 4rem;
      font-weight: 400;
    }

    .sub strong {
      color: var(--text);
      font-weight: 500;
    }

    .cta-row {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .cta-line {
      width: 48px;
      height: 1px;
      background: var(--muted);
    }

    .cta-text {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .email-link {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      letter-spacing: -0.01em;
    }

    .email-link:hover {
      border-color: var(--accent);
    }

    footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.8rem 3.5rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-left {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .footer-right {
      display: flex;
      gap: 2rem;
    }

    .footer-right span {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .footer-right span::before {
      content: '—  ';
      color: var(--border);
    }

    @media (max-width: 600px) {
      header, main, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      main { padding-top: 3rem; padding-bottom: 3rem; }
      footer { flex-direction: column; align-items: flex-start; }
      .footer-right { flex-direction: column; gap: 0.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
      .email-link { transition: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wordmark">Sunel<span>dah</span></div>
    <div class="header-tag">Marondera, Zimbabwe</div>
  </header>

  <main>
    <div class="eyebrow">
      <div class="dot"></div>
      <span class="eyebrow-text">New site launching soon</span>
    </div>

    <h1>We build<br /><em>digital</em><br />infrastructure.</h1>

    <p class="sub">
      Suneldah is a <strong>software company</strong> based in Zimbabwe —
      designing and shipping products that work where people actually are.
    </p>

    <div class="cta-row">
      <div class="cta-line"></div>
      <span class="cta-text">Get in touch</span>
      <a class="email-link" href="mailto:dev@suneldah.com">hello@suneldah.com</a>
    </div>
  </main>

  <footer>
    <span class="footer-left">© 2026 Suneldah (Pvt) Ltd</span>
    <div class="footer-right">
      <span>Software</span>
      <span>Product</span>
      <span>Africa</span>
    </div>
  </footer>

</body>
</html>
