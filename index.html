<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suneldah — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f0e;
      --surface: #141918;
      --green: #00e676;
      --green-dim: #00e67622;
      --text: #e8ede9;
      --muted: #6b7c6e;
      --border: #1f2b22;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #00e67614 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      background: var(--green-dim);
      color: var(--green);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid #00e67633;
      margin-bottom: 2rem;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .logo span {
      color: var(--green);
    }

    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--green);
      margin: 0 auto 2.5rem;
      border-radius: 2px;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #b5c4b8;
      margin-bottom: 2.5rem;
    }

    .message strong {
      color: var(--text);
      font-weight: 600;
    }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--green);
      color: #0b0f0e;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.85rem 1.8rem;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      letter-spacing: 0.01em;
    }

    .whatsapp-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .whatsapp-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .card { padding: 2.2rem 1.5rem; }
      .logo { font-size: 2rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .whatsapp-btn { transition: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🇿🇼 Zimbabwe · Digital Products</div>

    <div class="logo">Sunel<span>dah</span></div>
    <p class="tagline">WhatsApp-native tools built for Africa</p>

    <div class="divider"></div>

    <p class="message">
      We're upgrading our platform.<br />
      <strong>Something better is on the way.</strong><br /><br />
      In the meantime, reach us directly on WhatsApp — we respond fast.
    </p>

    <a class="whatsapp-btn" href="https://wa.me/263780000000" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

      Chat with us on WhatsApp
    </a>

    <p class="footer">© 2026 Suneldah · Marondera, Zimbabwe</p>
  </div>
</body>
</html>
